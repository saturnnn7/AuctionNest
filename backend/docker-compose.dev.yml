services:
  postgres:
    image: postgres:16-alpine
    container_name: auctionnest-postgres-dev
    environment:
      POSTGRES_DB: auctionnest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: auctionnest-redis-dev
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres-dev-data: