name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore backend/AuctionNest.sln

      - name: Build
        run: dotnet build backend/AuctionNest.sln --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test backend/tests/AuctionNest.UnitTests
          --no-build
          --configuration Release
          --verbosity normal
          --logger "console;verbosity=detailed"