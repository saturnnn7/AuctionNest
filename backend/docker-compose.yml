services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auctionnest-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=auctionnest;Username=postgres;Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      Jwt__Issuer: "auctionnest-api"
      Jwt__Audience: "auctionnest-client"
      Jwt__PrivateKeyPath: "/app/keys/private.pem"
      Jwt__PublicKeyPath: "/app/keys/public.pem"
      Jwt__AccessTokenExpiryMinutes: "15"
      Jwt__RefreshTokenExpiryDays: "7"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: auctionnest-postgres
    environment:
      POSTGRES_DB: auctionnest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: auctionnest-redis
    restart: unless-stopped

volumes:
  postgres-data: